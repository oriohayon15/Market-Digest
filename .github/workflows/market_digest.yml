name: Market Digest

on:
  schedule:
    - cron: "0 20 * * 1-5"  # 4pm ET (EDT, UTC-4) — change to 21 in November when clocks fall back
  workflow_dispatch:         # lets you trigger it manually from GitHub as a test

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Market Digest
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python market_digest.py
